<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>the keep</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #1a1612;
  --bg2:       #221e19;
  --card:      #2a2420;
  --card2:     #322c26;
  --border:    #3d3630;
  --border2:   #4a433b;
  --amber:     #c8a96e;
  --amber-dim: #9a7e4f;
  --amber-bg:  rgba(200,169,110,0.08);
  --cream:     #e8dcc8;
  --muted:     #8a7e6e;
  --faint:     #5a5040;
  --red:       #c87060;
  --green:     #70a880;
  --blue:      #6090b0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  padding: 24px 16px 60px;
  max-width: 1180px;
  margin: 0 auto;
}

.header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 10px;
}

.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 400;
  color: var(--cream);
  letter-spacing: -0.02em;
}
.wordmark em { font-style: italic; color: var(--amber); }

.app-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--muted);
  text-transform: uppercase;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.main-nav {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
  gap: 4px;
}

.nav-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 12px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-btn.active {
  background: var(--card2);
  color: var(--cream);
  border: 1px solid var(--border2);
}

.overview {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 22px;
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 18px;
  align-items: center;
}

.overview-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.overview-copy {
  font-size: 13px;
  color: var(--amber);
  line-height: 1.5;
}

.overview-stats {
  display: flex;
  justify-content: flex-end;
  gap: 22px;
  flex-wrap: wrap;
}

.overview-stat {
  display: flex;
  align-items: baseline;
  gap: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 10px;
}

.overview-stat strong {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--cream);
  font-weight: 400;
}

.panel { display: none; }
.panel.active { display: block; }

.two-col {
  display: grid;
  grid-template-columns: 1.55fr 1fr;
  gap: 20px;
  align-items: start;
}

.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.stack { display: grid; gap: 14px; }

.task-row,
.stock-row,
.shop-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}

.task-head,
.stock-head,
.shop-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.task-title,
.stock-title,
.shop-title {
  font-size: 13px;
  color: var(--cream);
  line-height: 1.4;
}

.task-sub,
.stock-sub,
.shop-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.4;
}

.badge {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  color: var(--muted);
  white-space: nowrap;
}

.badge.low   { color: var(--red); border-color: var(--red); }
.badge.due   { color: var(--amber); border-color: var(--amber-dim); }
.badge.ok    { color: var(--muted); }
.badge.done  { color: var(--green); border-color: var(--green); }
.badge.soon  { color: var(--blue); border-color: var(--blue); }

.row-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.btn-sm,
.btn-inline,
.btn-primary,
.btn-secondary,
.input,
.select,
.number-input,
.textarea {
  font-family: 'DM Mono', monospace;
}

.btn-inline {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-inline:hover { border-color: var(--amber); color: var(--amber); }
.btn-inline.danger:hover { border-color: var(--red); color: var(--red); }

.btn-primary {
  width: 100%;
  background: var(--amber);
  border: none;
  border-radius: 7px;
  color: #1a1612;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: #d4b87e; }

.btn-secondary {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { color: var(--cream); border-color: var(--amber); }

.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.input,
.select,
.number-input,
.textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px dashed var(--border2);
  border-radius: 5px;
  color: var(--cream);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
.input:focus,
.select:focus,
.number-input:focus,
.textarea:focus {
  border-color: var(--amber);
  border-style: solid;
}

.select option { background: var(--card2); }
.textarea { resize: vertical; min-height: 88px; line-height: 1.5; }

.form-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-grid-4 {
  display: grid;
  grid-template-columns: minmax(170px, 2fr) minmax(120px, 1.2fr) 90px 90px;
  gap: 10px;
}

.task-check {
  display: flex;
  align-items: center;
  gap: 10px;
}

.checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--amber);
  flex-shrink: 0;
}

.stock-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.stock-qty {
  display: flex;
  align-items: center;
  gap: 8px;
}

.qty-value {
  min-width: 18px;
  text-align: center;
  font-size: 12px;
  color: var(--cream);
}

.threshold-group {
  display: flex;
  align-items: center;
  gap: 6px;
}

.threshold-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.threshold-input {
  width: 56px;
  background: var(--bg2);
  border: 1px dashed var(--border2);
  border-radius: 5px;
  color: var(--cream);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 8px 8px;
  outline: none;
  text-align: center;
  transition: border-color 0.2s;
}
.threshold-input:focus {
  border-color: var(--amber);
  border-style: solid;
}

.stock-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.empty {
  color: var(--faint);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  padding: 28px 12px;
}

.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.filter-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 10px;
  border-radius: 5px;
  cursor: pointer;
}
.filter-btn.active {
  color: var(--amber);
  border-color: var(--amber-dim);
  background: var(--amber-bg);
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--cream);
  transition: transform 0.3s ease;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

@media (max-width: 980px) {
  .two-col,
  .overview {
    grid-template-columns: 1fr;
  }
  .overview-stats {
    justify-content: flex-start;
  }
}

@media (max-width: 720px) {
  .main-nav {
    grid-template-columns: 1fr 1fr;
  }
  .form-grid-2,
  .form-grid-4 {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<header class="header">
  <div class="wordmark">the <em>keep</em></div>
  <div class="app-status">
    <div class="status-dot"></div>
    <span>household rhythms</span>
  </div>
</header>

<nav class="main-nav">
  <button class="nav-btn active" data-panel="today">today</button>
  <button class="nav-btn" data-panel="routines">routines</button>
  <button class="nav-btn" data-panel="stock">stock</button>
  <button class="nav-btn" data-panel="shopping">shopping</button>
</nav>

<div class="overview">
  <div>
    <div class="overview-label">overview</div>
    <div class="overview-copy">a household operating tool for cleaning, upkeep, and stocking</div>
  </div>
  <div class="overview-stats" id="overviewStats"></div>
</div>

<div id="panel-today" class="panel active"></div>
<div id="panel-routines" class="panel"></div>
<div id="panel-stock" class="panel"></div>
<div id="panel-shopping" class="panel"></div>

<div class="toast" id="toast"></div>

<script>
const SEED_DATA = {
  routines: [
    { id: uid(), title: "Wipe kitchen counters", area: "Kitchen", frequency: "daily", interval: 1, last_completed: daysAgo(1), notes: "" },
    { id: uid(), title: "Unload dishwasher", area: "Kitchen", frequency: "daily", interval: 1, last_completed: daysAgo(0), notes: "" },
    { id: uid(), title: "Vacuum living room", area: "Living Room", frequency: "weekly", interval: 1, last_completed: daysAgo(9), notes: "" },
    { id: uid(), title: "Clean bathroom sink", area: "Bathroom", frequency: "weekly", interval: 1, last_completed: daysAgo(5), notes: "" },
    { id: uid(), title: "Wash sheets", area: "Bedroom", frequency: "weekly", interval: 2, last_completed: daysAgo(11), notes: "" },
    { id: uid(), title: "Organize pantry", area: "Kitchen", frequency: "monthly", interval: 1, last_completed: daysAgo(34), notes: "" },
    { id: uid(), title: "Clean dryer lint area", area: "Laundry Room", frequency: "monthly", interval: 1, last_completed: daysAgo(20), notes: "" },
    { id: uid(), title: "Replace HVAC filter", area: "Hallway", frequency: "quarterly", interval: 1, last_completed: daysAgo(80), notes: "" }
  ],
  stock: [
    { id: uid(), name: "Paper towels", location: "Pantry", par_level: 6, current_level: 0, reorder_threshold: 2 },
    { id: uid(), name: "Toilet paper", location: "Bathroom", par_level: 12, current_level: 8, reorder_threshold: 4 },
    { id: uid(), name: "Dish soap", location: "Kitchen", par_level: 2, current_level: 2, reorder_threshold: 1 },
    { id: uid(), name: "Dishwasher tabs", location: "Kitchen", par_level: 1, current_level: 4, reorder_threshold: 0 },
    { id: uid(), name: "Sponges", location: "Kitchen", par_level: 4, current_level: 4, reorder_threshold: 1 },
    { id: uid(), name: "All-purpose cleaner", location: "Laundry Room", par_level: 2, current_level: 3, reorder_threshold: 1 },
    { id: uid(), name: "Laundry detergent", location: "Laundry Room", par_level: 2, current_level: 4, reorder_threshold: 1 },
    { id: uid(), name: "Trash bags", location: "Laundry Room", par_level: 2, current_level: 3, reorder_threshold: 1 }
  ],
  shopping: [
    { id: uid(), name: "Paper towels", category: "Pantry", checked: false, source: "stock" },
    { id: uid(), name: "White vinegar", category: "Cleaning", checked: false, source: "manual" }
  ]
};

let appData = loadAppData();
let routineFilter = "all";
let toastTimer = null;

document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => switchPanel(btn.dataset.panel));
});

renderAll();

function uid() {
  if (window.crypto?.randomUUID) return window.crypto.randomUUID();
  return "id-" + Math.random().toString(36).slice(2, 10);
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}

function daysFromNow(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function diffDays(fromISO, toISO) {
  const a = new Date(fromISO + "T00:00:00");
  const b = new Date(toISO + "T00:00:00");
  return Math.round((b - a) / 86400000);
}

function addDays(iso, n) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function frequencyDays(freq, interval = 1) {
  const i = Math.max(1, Number(interval) || 1);
  if (freq === "daily") return 1 * i;
  if (freq === "weekly") return 7 * i;
  if (freq === "monthly") return 30 * i;
  if (freq === "quarterly") return 90 * i;
  return 7;
}

function computeRoutineStatus(r) {
  const base = r.last_completed || todayISO();
  const dueDate = addDays(base, frequencyDays(r.frequency, r.interval));
  const daysUntilDue = diffDays(todayISO(), dueDate);
  let status = "upcoming";
  if (daysUntilDue < 0) status = "overdue";
  else if (daysUntilDue === 0) status = "due";
  else if (daysUntilDue <= 3) status = "soon";

  return { dueDate, daysUntilDue, status };
}

function loadAppData() {
  try {
    const stored = localStorage.getItem("the_keep_data");
    if (!stored) {
      localStorage.setItem("the_keep_data", JSON.stringify(SEED_DATA));
      return structuredClone(SEED_DATA);
    }
    const parsed = JSON.parse(stored);
    parsed.routines ??= [];
    parsed.stock ??= [];
    parsed.shopping ??= [];
    return parsed;
  } catch (e) {
    return structuredClone(SEED_DATA);
  }
}

function saveAppData() {
  localStorage.setItem("the_keep_data", JSON.stringify(appData));
}

function switchPanel(name) {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.panel === name);
  });
  document.querySelectorAll(".panel").forEach(panel => {
    panel.classList.toggle("active", panel.id === `panel-${name}`);
  });
}

function renderAll() {
  renderOverview();
  renderToday();
  renderRoutines();
  renderStock();
  renderShopping();
}

function renderOverview() {
  const routineStatuses = appData.routines.map(computeRoutineStatus);
  const dueToday = routineStatuses.filter(r => r.status === "due").length;
  const overdue = routineStatuses.filter(r => r.status === "overdue").length;
  const lowStock = appData.stock.filter(s => Number(s.current_level) <= Number(s.reorder_threshold)).length;
  const shopping = appData.shopping.filter(i => !i.checked).length;

  document.getElementById("overviewStats").innerHTML = `
    <div class="overview-stat"><strong>${dueToday}</strong><span>due today</span></div>
    <div class="overview-stat"><strong>${overdue}</strong><span>overdue</span></div>
    <div class="overview-stat"><strong>${lowStock}</strong><span>low stock</span></div>
    <div class="overview-stat"><strong>${shopping}</strong><span>shopping</span></div>
  `;
}

function renderToday() {
  const enriched = appData.routines.map(r => ({ ...r, ...computeRoutineStatus(r) }));
  const overdue = enriched.filter(r => r.status === "overdue");
  const due = enriched.filter(r => r.status === "due");
  const upcoming = enriched.filter(r => r.status === "soon" || r.status === "upcoming")
    .sort((a, b) => a.daysUntilDue - b.daysUntilDue)
    .slice(0, 6);
  const lowStock = appData.stock.filter(s => Number(s.current_level) <= Number(s.reorder_threshold));
  const shopping = appData.shopping.filter(i => !i.checked);

  document.getElementById("panel-today").innerHTML = `
    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-label">overdue</div>
          <div class="stack">${overdue.length ? overdue.map(renderRoutineRow).join("") : `<div class="empty">nothing overdue</div>`}</div>
        </div>

        <div class="section">
          <div class="section-label">due today</div>
          <div class="stack">${due.length ? due.map(renderRoutineRow).join("") : `<div class="empty">nothing due today</div>`}</div>
        </div>

        <div class="section">
          <div class="section-label">upcoming</div>
          <div class="stack">${upcoming.length ? upcoming.map(renderRoutineRow).join("") : `<div class="empty">nothing upcoming</div>`}</div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-label">low stock</div>
          <div class="stack">${lowStock.length ? lowStock.map(renderStockCardCompact).join("") : `<div class="empty">everything stocked</div>`}</div>
        </div>

        <div class="section">
          <div class="section-label">shopping list</div>
          <div class="stack">${shopping.length ? shopping.map(renderShoppingRow).join("") : `<div class="empty">shopping list is clear</div>`}</div>
        </div>
      </div>
    </div>
  `;
}

function renderRoutineRow(r) {
  const badgeClass =
    r.status === "overdue" ? "low" :
    r.status === "due" ? "due" :
    r.status === "soon" ? "soon" : "ok";

  const badgeText =
    r.status === "overdue" ? `overdue ${Math.abs(r.daysUntilDue)}d` :
    r.status === "due" ? "due today" :
    r.status === "soon" ? `${r.daysUntilDue}d` : r.dueDate;

  return `
    <div class="task-row">
      <div class="task-head">
        <div>
          <div class="task-check">
            <input class="checkbox" type="checkbox" onchange="completeRoutine('${r.id}')">
            <div class="task-title">${escapeHtml(r.title)}</div>
          </div>
          <div class="task-sub">${escapeHtml(r.area)} · ${escapeHtml(r.frequency)}${r.interval > 1 ? ` · every ${r.interval}` : ""}</div>
        </div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
    </div>
  `;
}

function renderStockCardCompact(item) {
  const low = Number(item.current_level) <= Number(item.reorder_threshold);
  return `
    <div class="stock-row">
      <div class="stock-head">
        <div>
          <div class="stock-title">${escapeHtml(item.name)}</div>
          <div class="stock-sub">${escapeHtml(item.location)} · ${item.current_level} on hand</div>
        </div>
        <div class="badge ${low ? "low" : "ok"}">${low ? "low stock" : "stocked"}</div>
      </div>
      <div class="row-actions">
        <button class="btn-inline" onclick="addStockToShopping('${item.id}')">add to shopping</button>
      </div>
    </div>
  `;
}

function renderRoutines() {
  const enriched = appData.routines.map(r => ({ ...r, ...computeRoutineStatus(r) }));
  const filtered = routineFilter === "all"
    ? enriched
    : enriched.filter(r => r.frequency === routineFilter);

  document.getElementById("panel-routines").innerHTML = `
    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-label">routines</div>
          <div class="filter-row">
            ${["all","daily","weekly","monthly","quarterly"].map(f => `
              <button class="filter-btn ${routineFilter === f ? "active" : ""}" onclick="setRoutineFilter('${f}')">${f}</button>
            `).join("")}
          </div>
          <div class="stack">
            ${filtered.length ? filtered.sort((a,b) => a.area.localeCompare(b.area) || a.title.localeCompare(b.title)).map(renderRoutineManageRow).join("") : `<div class="empty">no routines in this view</div>`}
          </div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-label">add routine</div>
          <div class="field">
            <label for="routineTitle">title</label>
            <input class="input" id="routineTitle" type="text" placeholder="e.g. vacuum living room">
          </div>
          <div class="form-grid-2">
            <div class="field">
              <label for="routineArea">area</label>
              <input class="input" id="routineArea" type="text" placeholder="e.g. Living Room">
            </div>
            <div class="field">
              <label for="routineFrequency">frequency</label>
              <select class="select" id="routineFrequency">
                <option value="daily">Daily</option>
                <option value="weekly" selected>Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="quarterly">Quarterly</option>
              </select>
            </div>
          </div>
          <div class="form-grid-2">
            <div class="field">
              <label for="routineInterval">interval</label>
              <input class="number-input" id="routineInterval" type="number" min="1" step="1" value="1">
            </div>
            <div class="field">
              <label for="routineLastCompleted">last completed</label>
              <input class="input" id="routineLastCompleted" type="date" value="${todayISO()}">
            </div>
          </div>
          <div class="field">
            <label for="routineNotes">notes</label>
            <textarea class="textarea" id="routineNotes" placeholder="Optional notes..."></textarea>
          </div>
          <button class="btn-primary" onclick="addRoutine()">save routine</button>
        </div>
      </div>
    </div>
  `;
}

function renderRoutineManageRow(r) {
  const badgeClass =
    r.status === "overdue" ? "low" :
    r.status === "due" ? "due" :
    r.status === "soon" ? "soon" : "ok";

  const badgeText =
    r.status === "overdue" ? `overdue ${Math.abs(r.daysUntilDue)}d` :
    r.status === "due" ? "due today" :
    r.status === "soon" ? `${r.daysUntilDue}d` : r.dueDate;

  return `
    <div class="task-row">
      <div class="task-head">
        <div>
          <div class="task-title">${escapeHtml(r.title)}</div>
          <div class="task-sub">${escapeHtml(r.area)} · ${escapeHtml(r.frequency)}${r.interval > 1 ? ` · every ${r.interval}` : ""} · last ${r.last_completed || "—"}</div>
        </div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="row-actions">
        <button class="btn-inline" onclick="completeRoutine('${r.id}')">complete</button>
        <button class="btn-inline danger" onclick="deleteRoutine('${r.id}')">delete</button>
      </div>
    </div>
  `;
}

function renderStock() {
  document.getElementById("panel-stock").innerHTML = `
    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-label">stock</div>
          <div class="stack">
            ${appData.stock.length ? appData.stock.map(renderStockManageRow).join("") : `<div class="empty">no stock items yet</div>`}
          </div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-label">add item</div>
          <div class="form-grid-4">
            <input class="input" id="stockName" type="text" placeholder="item">
            <input class="input" id="stockLocation" type="text" placeholder="location">
            <input class="number-input" id="stockPar" type="number" min="0" step="1" placeholder="par">
            <input class="number-input" id="stockCurrent" type="number" min="0" step="1" placeholder="current">
          </div>
          <div style="height:10px"></div>
          <div class="form-grid-2">
            <div class="field">
              <label for="stockThreshold">threshold</label>
              <input class="number-input" id="stockThreshold" type="number" min="0" step="1" value="1">
            </div>
            <div class="field">
              <label>&nbsp;</label>
              <button class="btn-primary" onclick="addStockItem()">save item</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderStockManageRow(item) {
  const low = Number(item.current_level) <= Number(item.reorder_threshold);
  return `
    <div class="stock-row">
      <div class="stock-head">
        <div>
          <div class="stock-title">${escapeHtml(item.name)}</div>
          <div class="stock-sub">${escapeHtml(item.location)} · par ${item.par_level}</div>
        </div>
        <div class="badge ${low ? "low" : "ok"}">${low ? "low stock" : "stocked"}</div>
      </div>

      <div class="stock-controls">
        <div class="stock-qty">
          <button class="btn-inline" onclick="adjustStock('${item.id}', -1)">−</button>
          <div class="qty-value">${item.current_level}</div>
          <button class="btn-inline" onclick="adjustStock('${item.id}', 1)">+</button>
        </div>

        <div class="threshold-group">
          <label class="threshold-label" for="threshold-${item.id}">threshold</label>
          <input
            id="threshold-${item.id}"
            class="threshold-input"
            type="number"
            min="0"
            step="1"
            value="${item.reorder_threshold}"
            onchange="updateThreshold('${item.id}', this.value)"
          >
        </div>

        <div class="stock-actions">
          <button class="btn-inline" onclick="addStockToShopping('${item.id}')">shop</button>
          <button class="btn-inline danger" onclick="deleteStockItem('${item.id}')">delete</button>
        </div>
      </div>
    </div>
  `;
}

function renderShopping() {
  const active = appData.shopping.filter(i => !i.checked);
  const done = appData.shopping.filter(i => i.checked);

  document.getElementById("panel-shopping").innerHTML = `
    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-label">shopping list</div>
          <div class="stack">
            ${active.length ? active.map(renderShoppingRow).join("") : `<div class="empty">shopping list is clear</div>`}
          </div>
        </div>

        <div class="section">
          <div class="section-label">completed</div>
          <div class="stack">
            ${done.length ? done.map(renderShoppingRow).join("") : `<div class="empty">nothing completed yet</div>`}
          </div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-label">add shopping item</div>
          <div class="field">
            <label for="shopName">item</label>
            <input class="input" id="shopName" type="text" placeholder="e.g. dish soap">
          </div>
          <div class="field">
            <label for="shopCategory">category</label>
            <input class="input" id="shopCategory" type="text" placeholder="e.g. Kitchen">
          </div>
          <button class="btn-primary" onclick="addShoppingItem()">save item</button>
        </div>
      </div>
    </div>
  `;
}

function renderShoppingRow(item) {
  return `
    <div class="shop-row">
      <div class="shop-head">
        <div>
          <div class="task-check">
            <input class="checkbox" type="checkbox" ${item.checked ? "checked" : ""} onchange="toggleShopping('${item.id}')">
            <div class="shop-title">${escapeHtml(item.name)}</div>
          </div>
          <div class="shop-sub">${escapeHtml(item.category || "Household")} · ${escapeHtml(item.source || "manual")}</div>
        </div>
        <div class="badge ${item.checked ? "done" : "ok"}">${item.checked ? "done" : "active"}</div>
      </div>
      <div class="row-actions">
        <button class="btn-inline danger" onclick="deleteShoppingItem('${item.id}')">delete</button>
      </div>
    </div>
  `;
}

function setRoutineFilter(filter) {
  routineFilter = filter;
  renderRoutines();
}

function completeRoutine(id) {
  const item = appData.routines.find(r => r.id === id);
  if (!item) return;
  item.last_completed = todayISO();
  saveAppData();
  renderAll();
  showToast(`completed: ${item.title}`, "success");
}

function deleteRoutine(id) {
  const idx = appData.routines.findIndex(r => r.id === id);
  if (idx < 0) return;
  const item = appData.routines[idx];
  if (!confirm(`Delete "${item.title}"?`)) return;
  appData.routines.splice(idx, 1);
  saveAppData();
  renderAll();
  showToast(`deleted: ${item.title}`, "success");
}

function addRoutine() {
  const title = document.getElementById("routineTitle").value.trim();
  const area = document.getElementById("routineArea").value.trim();
  const frequency = document.getElementById("routineFrequency").value;
  const interval = Math.max(1, parseInt(document.getElementById("routineInterval").value, 10) || 1);
  const last_completed = document.getElementById("routineLastCompleted").value || todayISO();
  const notes = document.getElementById("routineNotes").value.trim();

  if (!title || !area) {
    showToast("enter title and area", "error");
    return;
  }

  appData.routines.push({ id: uid(), title, area, frequency, interval, last_completed, notes });
  saveAppData();
  renderAll();
  showToast(`saved: ${title}`, "success");

  document.getElementById("routineTitle").value = "";
  document.getElementById("routineArea").value = "";
  document.getElementById("routineFrequency").value = "weekly";
  document.getElementById("routineInterval").value = "1";
  document.getElementById("routineLastCompleted").value = todayISO();
  document.getElementById("routineNotes").value = "";
}

function adjustStock(id, delta) {
  const item = appData.stock.find(s => s.id === id);
  if (!item) return;
  item.current_level = Math.max(0, Number(item.current_level || 0) + delta);
  saveAppData();
  renderAll();
}

function updateThreshold(id, value) {
  const item = appData.stock.find(s => s.id === id);
  if (!item) return;
  item.reorder_threshold = Math.max(0, parseInt(value, 10) || 0);
  saveAppData();
  renderAll();
}

function addStockItem() {
  const name = document.getElementById("stockName").value.trim();
  const location = document.getElementById("stockLocation").value.trim();
  const par_level = Math.max(0, parseInt(document.getElementById("stockPar").value, 10) || 0);
  const current_level = Math.max(0, parseInt(document.getElementById("stockCurrent").value, 10) || 0);
  const reorder_threshold = Math.max(0, parseInt(document.getElementById("stockThreshold").value, 10) || 0);

  if (!name || !location) {
    showToast("enter item and location", "error");
    return;
  }

  appData.stock.push({ id: uid(), name, location, par_level, current_level, reorder_threshold });
  saveAppData();
  renderAll();
  showToast(`saved: ${name}`, "success");

  document.getElementById("stockName").value = "";
  document.getElementById("stockLocation").value = "";
  document.getElementById("stockPar").value = "";
  document.getElementById("stockCurrent").value = "";
  document.getElementById("stockThreshold").value = "1";
}

function deleteStockItem(id) {
  const idx = appData.stock.findIndex(s => s.id === id);
  if (idx < 0) return;
  const item = appData.stock[idx];
  if (!confirm(`Delete "${item.name}" from stock?`)) return;
  appData.stock.splice(idx, 1);
  saveAppData();
  renderAll();
  showToast(`deleted: ${item.name}`, "success");
}

function addStockToShopping(id) {
  const item = appData.stock.find(s => s.id === id);
  if (!item) return;

  const exists = appData.shopping.some(s =>
    s.name.toLowerCase() === item.name.toLowerCase() && !s.checked
  );

  if (!exists) {
    appData.shopping.push({
      id: uid(),
      name: item.name,
      category: item.location || "Household",
      checked: false,
      source: "stock"
    });
    saveAppData();
    renderAll();
    showToast(`added to shopping: ${item.name}`, "success");
  } else {
    showToast("already on shopping list", "error");
  }
}

function addShoppingItem() {
  const name = document.getElementById("shopName").value.trim();
  const category = document.getElementById("shopCategory").value.trim();

  if (!name) {
    showToast("enter an item", "error");
    return;
  }

  appData.shopping.push({
    id: uid(),
    name,
    category: category || "Household",
    checked: false,
    source: "manual"
  });

  saveAppData();
  renderAll();
  showToast(`saved: ${name}`, "success");

  document.getElementById("shopName").value = "";
  document.getElementById("shopCategory").value = "";
}

function toggleShopping(id) {
  const item = appData.shopping.find(s => s.id === id);
  if (!item) return;
  item.checked = !item.checked;
  saveAppData();
  renderAll();
}

function deleteShoppingItem(id) {
  const idx = appData.shopping.findIndex(s => s.id === id);
  if (idx < 0) return;
  const item = appData.shopping[idx];
  appData.shopping.splice(idx, 1);
  saveAppData();
  renderAll();
  showToast(`deleted: ${item.name}`, "success");
}

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}
</script>
</body>
</html>
