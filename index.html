<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Keep</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
background:#1a1612;
color:#e8dcc8;
font-family:"DM Mono",monospace;
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
font-family:"Playfair Display",serif;
font-weight:400;
color:#c8a96e;
margin-bottom:20px;
}

button{
background:#c8a96e;
border:none;
padding:10px 16px;
cursor:pointer;
margin-top:12px;
}

.card{
background:#2a2420;
padding:16px;
border-radius:8px;
margin-bottom:12px;
}
</style>
</head>

<body>

<h1>the keep</h1>

<button onclick="loadRoutines()">Load Routines</button>

<div id="routines"></div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const SUPABASE_URL = "https://xpnznomjwzvrneulfmaa.supabase.co"
const SUPABASE_KEY = "sb_publishable_BF31unuVo4QhL6yYwBLYGA_W-bu2yC6"

const db = createClient(SUPABASE_URL, SUPABASE_KEY)

async function loadRoutines(){

const container = document.getElementById("routines")
container.innerHTML="Loading..."

const { data, error } = await db
.from("routines")
.select("*")
.order("room")

if(error){
container.innerHTML = "Error loading routines"
console.error(error)
return
}

container.innerHTML=""

data.forEach(r=>{
const el=document.createElement("div")
el.className="card"
el.innerHTML=`
<strong>${r.title}</strong><br>
Room: ${r.room}<br>
Frequency: ${r.frequency}
`
container.appendChild(el)
})

}

window.loadRoutines = loadRoutines

</script>

</body>
</html>
