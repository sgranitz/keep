<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Sans:wght@300;400;500&family=Victor+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Diesel Rudolf';
  src: url('../branding/Diesel-Rudolf_reduced.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}
:root {
  --bg:        #1a1612;
  --bg2:       #221e19;
  --card:      #2a2420;
  --card2:     #322c26;
  --border:    rgba(200,169,110,0.13);
  --border2:   rgba(200,169,110,0.25);
  --amber:     #c8a96e;
  --amber-dim: #9a7e4f;
  --amber-bg:  rgba(200,169,110,0.08);
  --cream:     #e8e0d4;
  --muted:     #8a8070;
  --faint:     #5a5040;
  --red:       #c87060;
  --green:     #70a880;
  --blue:      #6090b0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  padding: 24px 16px 60px;
  max-width: 1180px;
  margin: 0 auto;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 14px;
}

.header-left {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.back-link {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  opacity: 0.7;
}
.back-link:hover { color: var(--amber); opacity: 1; }

.wordmark {
  font-family: 'Diesel Rudolf', serif;
  font-size: 40px;
  font-weight: 400;
  color: var(--cream);
}
.wordmark em { color: var(--amber); }

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.identity-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-height: 42px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: rgba(255,255,255,0.02);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}

.status-copy {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.status-label {
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1;
}

.user-email {
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--amber);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 260px;
}

.main-nav {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  margin-bottom: 20px;
  gap: 4px;
}

.nav-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Victor Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 12px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-btn.active {
  background: var(--card2);
  color: var(--cream);
  border: 1px solid var(--border2);
}

.overview {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 22px;
  display: grid;
  grid-template-columns: 1.3fr 1fr;
  gap: 18px;
  align-items: center;
}

.overview-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.overview-copy {
  font-size: 13px;
  color: var(--amber);
  line-height: 1.5;
}

.overview-stats {
  display: flex;
  justify-content: flex-end;
  gap: 22px;
  flex-wrap: wrap;
}

.overview-stat {
  display: flex;
  align-items: baseline;
  gap: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 10px;
}

.overview-stat strong {
  font-family: 'Crimson Text', serif;
  font-size: 18px;
  color: var(--cream);
  font-weight: 400;
}

.panel { display: none; }
.panel.active { display: block; }

.two-col {
  display: grid;
  grid-template-columns: 1.55fr 1fr;
  gap: 20px;
  align-items: start;
}

.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 16px;
}

.section-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.stack { display: grid; gap: 14px; }

.task-row,
.stock-row,
.shop-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}

.task-head,
.stock-head,
.shop-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.task-title,
.stock-title,
.shop-title {
  font-size: 13px;
  color: var(--cream);
  line-height: 1.4;
}

.task-sub,
.stock-sub,
.shop-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.4;
}

.badge {
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 3px;
  border: 1px solid var(--border2);
  color: var(--muted);
  white-space: nowrap;
}

.badge.low   { color: var(--red); border-color: var(--red); }
.badge.due   { color: var(--amber); border-color: var(--amber-dim); }
.badge.ok    { color: var(--muted); }
.badge.done  { color: var(--green); border-color: var(--green); }
.badge.soon  { color: var(--blue); border-color: var(--blue); }

.row-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.btn-inline,
.btn-primary,
.input,
.select,
.number-input,
.textarea {
  font-family: 'Victor Mono', monospace;
}

.btn-inline {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-inline:hover { border-color: var(--amber); color: var(--amber); }
.btn-inline.danger:hover { border-color: var(--red); color: var(--red); }

.btn-primary {
  width: 100%;
  background: var(--amber);
  border: none;
  border-radius: 8px;
  color: #1a1612;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: #d4b87e; }

.field { margin-bottom: 12px; }

.field label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.input,
.select,
.number-input,
.textarea {
  width: 100%;
  background: var(--bg2);
  border: 1px dashed var(--border2);
  border-radius: 5px;
  color: var(--cream);
  font-size: 13px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.input:focus,
.select:focus,
.number-input:focus,
.textarea:focus {
  border-color: var(--amber);
  border-style: solid;
}

.select option { background: var(--card2); }
.textarea { resize: vertical; min-height: 88px; line-height: 1.5; }

.form-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.task-check {
  display: flex;
  align-items: center;
  gap: 10px;
}

.checkbox {
  width: 16px;
  height: 16px;
  accent-color: var(--amber);
  flex-shrink: 0;
}

.stock-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.stock-qty {
  display: flex;
  align-items: center;
  gap: 8px;
}

.qty-value {
  min-width: 18px;
  text-align: center;
  font-size: 12px;
  color: var(--cream);
}

.stock-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.empty {
  color: var(--faint);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
  padding: 28px 12px;
}

.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.filter-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 10px;
  border-radius: 5px;
  cursor: pointer;
}

.filter-btn.active {
  color: var(--amber);
  border-color: var(--amber-dim);
  background: var(--amber-bg);
}

.loading {
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 18px 2px;
}

.auth-copy {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.6;
  margin-bottom: 14px;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 20px;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--cream);
  transition: transform 0.3s ease;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

@media (max-width: 980px) {
  .two-col,
  .overview {
    grid-template-columns: 1fr;
  }

  .overview-stats {
    justify-content: flex-start;
  }
}

@media (max-width: 720px) {
  .main-nav {
    grid-template-columns: 1fr 1fr;
  }

  .form-grid-2 {
    grid-template-columns: 1fr;
  }

  .header {
    align-items: flex-start;
  }

  .header-right {
    width: 100%;
    justify-content: space-between;
  }

  .identity-pill {
    max-width: 100%;
  }

  .user-email {
    max-width: 180px;
  }
}

@media (max-width: 480px) {
  body { padding: 16px 12px 48px; }
  .main-nav { gap: 3px; }
  .main-nav button { font-size: 10px; padding: 10px 4px; letter-spacing: 0.08em; }
  .section { padding: 14px; }
  .user-email { max-width: 130px; }
  .seam { margin: 6px 0; }
}

.tool-footer {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  margin-top: 64px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  opacity: 0.45;
}
.tool-footer span {
  font-family: 'Victor Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.seam {
  width: 100%;
  height: 20px;
  margin: 10px 0;
  display: block;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="back-link" href="https://www.stoult.com/workshop/">← return to the workshop</a>
    <div class="wordmark">the <em>keep</em></div>
  </div>

  <div class="header-right">
    <div class="identity-pill">
      <div class="status-dot"></div>
      <div class="status-copy">
        <span class="status-label" id="statusLabel">private household</span>
        <span class="user-email" id="userEmail">signed out</span>
      </div>
    </div>
    <button class="btn-inline" id="signOutBtn" onclick="signOut()" style="display:none;">sign out</button>
  </div>
</header>

<svg class="seam" viewBox="0 0 900 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0 9 Q170 15 400 10 Q630 5 900 13" fill="none" stroke="var(--amber)" stroke-width="1" opacity="0.35"/>
</svg>

<nav class="main-nav">
  <button class="nav-btn active" data-panel="today">today</button>
  <button class="nav-btn" data-panel="routines">routines</button>
  <button class="nav-btn" data-panel="stock">stock</button>
  <button class="nav-btn" data-panel="shopping">shopping</button>
</nav>

<div class="overview">
  <div>
    <div class="overview-label">overview</div>
    <div class="overview-copy">a household operating tool for cleaning, upkeep, and stocking</div>
  </div>
  <div class="overview-stats" id="overviewStats"></div>
</div>

<div id="authGate" class="section" style="display:none; max-width:560px;">
  <div class="section-label">sign in</div>
  <div class="auth-copy">
    Enter your email and a secure sign-in link will be sent to you. If you have signed in before, your session should persist until you sign out.
  </div>
  <div class="field">
    <label for="emailInput">email</label>
    <input class="input" id="emailInput" type="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <button class="btn-primary" onclick="signInWithMagicLink()">email me a magic link</button>
</div>

<div id="appShell" style="display:none;">
  <div id="panel-today" class="panel active"></div>
  <div id="panel-routines" class="panel"></div>
  <div id="panel-stock" class="panel"></div>
  <div id="panel-shopping" class="panel"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://xpnznomjwzvrneulfmaa.supabase.co";
const SUPABASE_KEY = "sb_publishable_BF31unuVo4QhL6yYwBLYGA_W-bu2yC6";

const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

let rooms = [];
let appData = { routines: [], stock: [], shopping: [] };
let filters = { today: "All", routines: "All", stock: "All", shopping: "All" };
let toastTimer = null;
let isLoading = true;
let currentUser = null;
let sessionReady = false;
let initialAuthResolved = false;
let activeLoadPromise = null;

document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => switchPanel(btn.dataset.panel));
});

window.setRoomFilter = setRoomFilter;
window.addRoutine = addRoutine;
window.completeRoutine = completeRoutine;
window.deleteRoutine = deleteRoutine;
window.addStockItem = addStockItem;
window.adjustStock = adjustStock;
window.deleteStockItem = deleteStockItem;
window.addStockToShopping = addStockToShopping;
window.addShoppingItem = addShoppingItem;
window.toggleShopping = toggleShopping;
window.deleteShoppingItem = deleteShoppingItem;
window.addRoom = addRoom;
window.deleteRoom = deleteRoom;
window.signInWithMagicLink = signInWithMagicLink;
window.signOut = signOut;

init();

async function init() {
  bindAuthListener();
  await restoreSession();
}

async function restoreSession() {
  try {
    const { data, error } = await db.auth.getSession();
    if (error) throw error;

    currentUser = data.session?.user ?? null;
    sessionReady = true;

    if (currentUser) {
      showSignedIn();
      await loadAllFromSupabase({ silent: true });
    } else {
      appData = { routines: [], stock: [], shopping: [] };
      rooms = [];
      showSignedOut();
      renderAll();
    }

    initialAuthResolved = true;
  } catch (err) {
    console.error("restoreSession error:", err);
    currentUser = null;
    sessionReady = true;
    appData = { routines: [], stock: [], shopping: [] };
    rooms = [];
    showSignedOut();
    renderAll();
    initialAuthResolved = true;
  }
}

function bindAuthListener() {
  db.auth.onAuthStateChange(async (event, session) => {
    try {
      // Skip INITIAL_SESSION entirely — restoreSession handles it
      if (event === "INITIAL_SESSION") return;

      currentUser = session?.user ?? null;
      sessionReady = true;

      if (currentUser) {
        showSignedIn();
        await loadAllFromSupabase({ silent: true });
      } else {
        appData = { routines: [], stock: [], shopping: [] };
        rooms = [];
        isLoading = false;
        showSignedOut();
        renderAll();
      }
    } catch (err) {
      console.error("auth state change error:", err);
      appData = { routines: [], stock: [], shopping: [] };
      rooms = [];
      isLoading = false;
      showSignedOut();
      renderAll();
    }
  });
}

function showSignedIn() {
  document.getElementById("authGate").style.display = "none";
  document.getElementById("appShell").style.display = "block";
  document.getElementById("signOutBtn").style.display = "inline-flex";
  document.getElementById("statusLabel").textContent = "private household";
  document.getElementById("userEmail").textContent = currentUser?.email || "signed in";
}

function showSignedOut() {
  document.getElementById("authGate").style.display = "block";
  document.getElementById("appShell").style.display = "none";
  document.getElementById("signOutBtn").style.display = "none";
  document.getElementById("statusLabel").textContent = "private household";
  document.getElementById("userEmail").textContent = "signed out";
  isLoading = false;
}

async function signInWithMagicLink() {
  const email = document.getElementById("emailInput").value.trim();

  if (!email) {
    showToast("enter your email", "error");
    return;
  }

  try {
    const { error } = await db.auth.signInWithOtp({
      email,
      options: {
        emailRedirectTo: window.location.origin + window.location.pathname,
        shouldCreateUser: true
      }
    });

    if (error) throw error;
    showToast("check your email for the magic link", "success");
  } catch (err) {
    console.error("signInWithMagicLink error:", err);
    showToast("failed to send magic link", "error");
  }
}

async function signOut() {
  try {
    const { error } = await db.auth.signOut();
    if (error) throw error;

    currentUser = null;
    appData = { routines: [], stock: [], shopping: [] };
    rooms = [];
    isLoading = false;

    showSignedOut();
    renderAll();
    showToast("signed out", "success");
  } catch (err) {
    console.error("signOut error:", err);
    showToast("failed to sign out", "error");
  }
}

async function loadAllFromSupabase({ silent = false } = {}) {
  if (activeLoadPromise) return activeLoadPromise;

  activeLoadPromise = (async () => {
    if (!currentUser) {
      appData = { routines: [], stock: [], shopping: [] };
      rooms = [];
      isLoading = false;
      renderAll();
      return;
    }

    isLoading = true;
    renderAll();

    try {
      const timeout = (ms) =>
        new Promise((_, reject) =>
          setTimeout(() => reject(new Error("request timeout")), ms)
        );

      const fetchAll = Promise.all([
        db.from("rooms").select("*").order("sort_order").order("name"),
        db.from("routines").select("*").order("title"),
        db.from("stock_items").select("*").order("name"),
        db.from("shopping_items").select("*").order("checked").order("name")
      ]);

      const [roomsRes, routinesRes, stockRes, shoppingRes] = await Promise.race([
        fetchAll,
        timeout(10000)
      ]);

      if (roomsRes.error || routinesRes.error || stockRes.error || shoppingRes.error) {
        console.error("rooms error:", roomsRes.error);
        console.error("routines error:", routinesRes.error);
        console.error("stock error:", stockRes.error);
        console.error("shopping error:", shoppingRes.error);
        throw new Error("failed to load data");
      }

      rooms = roomsRes.data || [];
      appData.routines = routinesRes.data || [];
      appData.stock = stockRes.data || [];
      appData.shopping = shoppingRes.data || [];
    } catch (err) {
      console.error("loadAllFromSupabase error:", err);
      rooms = [];
      appData = { routines: [], stock: [], shopping: [] };

      if (!silent) {
        showToast("failed to load data", "error");
      }
    } finally {
      isLoading = false;
      renderAll();
      activeLoadPromise = null;
    }
  })();

  return activeLoadPromise;
}

function switchPanel(name) {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.panel === name);
  });
  document.querySelectorAll(".panel").forEach(panel => {
    panel.classList.toggle("active", panel.id === `panel-${name}`);
  });
}

function roomName(roomId) {
  return rooms.find(r => r.id === roomId)?.name || "Unknown room";
}

function roomUsageCounts(roomId) {
  return {
    routines: appData.routines.filter(r => r.room_id === roomId).length,
    stock: appData.stock.filter(s => s.room_id === roomId).length,
    shopping: appData.shopping.filter(s => s.room_id === roomId).length
  };
}

function nextRoomSortOrder() {
  return (rooms.length ? Math.max(...rooms.map(r => Number(r.sort_order) || 0)) : 0) + 1;
}

function filterByRoom(items, panelName) {
  const roomId = filters[panelName];
  if (!roomId || roomId === "All") return items;
  return items.filter(x => x.room_id === roomId);
}

function renderRoomFilters(panelName) {
  const values = [{ id: "All", name: "All" }, ...rooms];

  return `
    <div class="filter-row">
      ${values.map(room => `
        <button class="filter-btn ${filters[panelName] === room.id ? "active" : ""}"
          onclick="setRoomFilter('${panelName}', '${escapeJs(room.id)}')">
          ${escapeHtml(room.name)}
        </button>
      `).join("")}
    </div>
  `;
}

function setRoomFilter(panelName, room) {
  filters[panelName] = room;
  renderAll();
}

function renderAll() {
  renderOverview();
  renderToday();
  renderRoutines();
  renderStock();
  renderShopping();
}

function renderOverview() {
  if (!sessionReady || !currentUser) {
    document.getElementById("overviewStats").innerHTML = "";
    return;
  }

  const routineStatuses = appData.routines.map(computeRoutineStatus);
  const dueToday = routineStatuses.filter(r => r.status === "due").length;
  const overdue = routineStatuses.filter(r => r.status === "overdue").length;
  const outOfStock = appData.stock.filter(s => Number(s.in_stock) === 0).length;
  const shopping = appData.shopping.filter(i => !i.checked).length;

  document.getElementById("overviewStats").innerHTML = `
    <div class="overview-stat"><strong>${dueToday}</strong><span>due today</span></div>
    <div class="overview-stat"><strong>${overdue}</strong><span>overdue</span></div>
    <div class="overview-stat"><strong>${outOfStock}</strong><span>out of stock</span></div>
    <div class="overview-stat"><strong>${shopping}</strong><span>shopping</span></div>
  `;
}

function renderToday() {
  if (!sessionReady || !currentUser) return;

  if (isLoading) {
    document.getElementById("panel-today").innerHTML = `<div class="loading">loading…</div>`;
    return;
  }

  let enriched = appData.routines.map(r => ({ ...r, ...computeRoutineStatus(r) }));
  enriched = filterByRoom(enriched, "today");

  const overdue = enriched
    .filter(r => r.status === "overdue")
    .sort((a, b) =>
      roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
      a.title.localeCompare(b.title)
    );

  const due = enriched
    .filter(r => r.status === "due")
    .sort((a, b) =>
      roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
      a.title.localeCompare(b.title)
    );

  const upcoming = enriched
    .filter(r => r.status === "soon" || r.status === "upcoming")
    .sort((a, b) =>
      a.daysUntilDue - b.daysUntilDue ||
      roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
      a.title.localeCompare(b.title)
    )
    .slice(0, 8);

  const outOfStock = filterByRoom(appData.stock, "today")
    .filter(s => Number(s.in_stock) === 0)
    .sort((a, b) =>
      roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
      a.name.localeCompare(b.name)
    );

  const shopping = filterByRoom(appData.shopping, "today")
    .filter(i => !i.checked)
    .sort((a, b) =>
      roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
      a.name.localeCompare(b.name)
    );

  document.getElementById("panel-today").innerHTML = `
    ${renderRoomFilters("today")}
    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-label">overdue</div>
          <div class="stack">${overdue.length ? overdue.map(renderRoutineRow).join("") : `<div class="empty">nothing overdue</div>`}</div>
        </div>

        <div class="section">
          <div class="section-label">due today</div>
          <div class="stack">${due.length ? due.map(renderRoutineRow).join("") : `<div class="empty">nothing due today</div>`}</div>
        </div>

        <div class="section">
          <div class="section-label">upcoming</div>
          <div class="stack">${upcoming.length ? upcoming.map(renderRoutineRow).join("") : `<div class="empty">nothing upcoming</div>`}</div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-label">out of stock</div>
          <div class="stack">${outOfStock.length ? outOfStock.map(renderStockCardCompact).join("") : `<div class="empty">everything stocked</div>`}</div>
        </div>

        <div class="section">
          <div class="section-label">shopping list</div>
          <div class="stack">${shopping.length ? shopping.map(renderShoppingRow).join("") : `<div class="empty">shopping list is clear</div>`}</div>
        </div>
      </div>
    </div>
  `;
}

function renderRoutineRow(r) {
  const badgeClass =
    r.status === "overdue" ? "low" :
    r.status === "due" ? "due" :
    r.status === "soon" ? "soon" : "ok";

  const badgeText =
    r.status === "overdue" ? `overdue ${Math.abs(r.daysUntilDue)}d` :
    r.status === "due" ? "due today" :
    r.status === "soon" ? `${r.daysUntilDue}d` : r.dueDate;

  return `
    <div class="task-row">
      <div class="task-head">
        <div>
          <div class="task-check">
            <input class="checkbox" type="checkbox" onchange="completeRoutine('${r.id}')">
            <div class="task-title">${escapeHtml(r.title)}</div>
          </div>
          <div class="task-sub">${escapeHtml(roomName(r.room_id))} · ${escapeHtml(frequencyLabel(r.frequency, r.interval))}</div>
        </div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
    </div>
  `;
}

function renderRoutines() {
  if (!sessionReady || !currentUser) return;

  if (isLoading) {
    document.getElementById("panel-routines").innerHTML = `<div class="loading">loading…</div>`;
    return;
  }

  let enriched = appData.routines.map(r => ({ ...r, ...computeRoutineStatus(r) }));
  enriched = filterByRoom(enriched, "routines");
  enriched.sort((a, b) =>
    roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
    a.title.localeCompare(b.title)
  );

  document.getElementById("panel-routines").innerHTML = `
    ${renderRoomFilters("routines")}
    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-label">routines</div>
          <div class="stack">
            ${enriched.length ? enriched.map(renderRoutineManageRow).join("") : `<div class="empty">no routines in this view</div>`}
          </div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-label">add routine</div>
          ${rooms.length === 0 ? `<div class="empty">add rooms first</div>` : `
          <div class="field">
            <label for="routineTitle">title</label>
            <input class="input" id="routineTitle" type="text" placeholder="e.g. vacuum living room">
          </div>
          <div class="form-grid-2">
            <div class="field">
              <label for="routineRoom">room</label>
              <select class="select" id="routineRoom">
                ${rooms.map(r => `<option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="routineFrequency">frequency</label>
              <select class="select" id="routineFrequency">
                <option value="daily">Daily</option>
                <option value="weekly" selected>Weekly</option>
                <option value="monthly">Monthly</option>
                <option value="quarterly">Quarterly</option>
                <option value="custom">Custom days</option>
              </select>
            </div>
          </div>
          <div class="form-grid-2">
            <div class="field">
              <label for="routineInterval">interval</label>
              <input class="number-input" id="routineInterval" type="number" min="1" step="1" value="1">
            </div>
            <div class="field">
              <label for="routineLastCompleted">last completed</label>
              <input class="input" id="routineLastCompleted" type="date" value="${todayISO()}">
            </div>
          </div>
          <div class="field">
            <label for="routineNotes">notes</label>
            <textarea class="textarea" id="routineNotes" placeholder="Optional notes..."></textarea>
          </div>
          <button class="btn-primary" onclick="addRoutine()">save routine</button>`}
        </div>

        <div class="section">
          <div class="section-label">rooms</div>
          <div class="field">
            <label for="roomName">new room</label>
            <input class="input" id="roomName" type="text" placeholder="e.g. Garage">
          </div>
          <button class="btn-primary" onclick="addRoom()">add room</button>

          <div class="stack" style="margin-top:14px;">
            ${rooms.length ? rooms.map(room => {
              const usage = roomUsageCounts(room.id);
              const used = usage.routines + usage.stock + usage.shopping;

              return `
                <div class="task-row">
                  <div class="task-head">
                    <div>
                      <div class="task-title">${escapeHtml(room.name)}</div>
                      <div class="task-sub">
                        ${usage.routines} routines · ${usage.stock} stock · ${usage.shopping} shopping
                      </div>
                    </div>
                    <div class="badge ${used ? "ok" : "done"}">${used ? "in use" : "empty"}</div>
                  </div>
                  <div class="row-actions">
                    <button class="btn-inline danger" onclick="deleteRoom('${room.id}')">delete</button>
                  </div>
                </div>
              `;
            }).join("") : `<div class="empty">no rooms yet</div>`}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderRoutineManageRow(r) {
  const badgeClass =
    r.status === "overdue" ? "low" :
    r.status === "due" ? "due" :
    r.status === "soon" ? "soon" : "ok";

  const badgeText =
    r.status === "overdue" ? `overdue ${Math.abs(r.daysUntilDue)}d` :
    r.status === "due" ? "due today" :
    r.status === "soon" ? `${r.daysUntilDue}d` : r.dueDate;

  return `
    <div class="task-row">
      <div class="task-head">
        <div>
          <div class="task-title">${escapeHtml(r.title)}</div>
          <div class="task-sub">${escapeHtml(roomName(r.room_id))} · ${escapeHtml(frequencyLabel(r.frequency, r.interval))}${r.notes ? ` · ${escapeHtml(r.notes)}` : ""}</div>
        </div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="row-actions">
        <button class="btn-inline" onclick="completeRoutine('${r.id}')">complete</button>
        <button class="btn-inline danger" onclick="deleteRoutine('${r.id}')">delete</button>
      </div>
    </div>
  `;
}

function renderStock() {
  if (!sessionReady || !currentUser) return;

  if (isLoading) {
    document.getElementById("panel-stock").innerHTML = `<div class="loading">loading…</div>`;
    return;
  }

  let items = filterByRoom(appData.stock, "stock");
  items.sort((a, b) =>
    roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
    a.name.localeCompare(b.name)
  );

  document.getElementById("panel-stock").innerHTML = `
    ${renderRoomFilters("stock")}
    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-label">stock</div>
          <div class="stack">
            ${items.length ? items.map(renderStockManageRow).join("") : `<div class="empty">no stock items in this view</div>`}
          </div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-label">add item</div>
          ${rooms.length === 0 ? `<div class="empty">add rooms first</div>` : `
          <div class="field">
            <label for="stockName">item</label>
            <input class="input" id="stockName" type="text" placeholder="e.g. paper towels">
          </div>
          <div class="form-grid-2">
            <div class="field">
              <label for="stockRoom">room</label>
              <select class="select" id="stockRoom">
                ${rooms.map(r => `<option value="${escapeHtml(r.id)}">${escapeHtml(r.name)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="stockCount">in stock</label>
              <input class="number-input" id="stockCount" type="number" min="0" step="1" value="1">
            </div>
          </div>
          <button class="btn-primary" onclick="addStockItem()">save item</button>`}
        </div>
      </div>
    </div>
  `;
}

function renderStockCardCompact(item) {
  const empty = Number(item.in_stock) === 0;
  return `
    <div class="stock-row">
      <div class="stock-head">
        <div>
          <div class="stock-title">${escapeHtml(item.name)}</div>
          <div class="stock-sub">${escapeHtml(roomName(item.room_id))} · in stock ${item.in_stock}</div>
        </div>
        <div class="badge ${empty ? "low" : "ok"}">${empty ? "out" : "stocked"}</div>
      </div>
      <div class="row-actions">
        <button class="btn-inline" onclick="addStockToShopping('${item.id}')">add to shopping</button>
      </div>
    </div>
  `;
}

function renderStockManageRow(item) {
  const empty = Number(item.in_stock) === 0;
  return `
    <div class="stock-row">
      <div class="stock-head">
        <div>
          <div class="stock-title">${escapeHtml(item.name)}</div>
          <div class="stock-sub">${escapeHtml(roomName(item.room_id))} · in stock ${item.in_stock}</div>
        </div>
        <div class="badge ${empty ? "low" : "ok"}">${empty ? "out of stock" : "stocked"}</div>
      </div>

      <div class="stock-controls">
        <div class="stock-qty">
          <button class="btn-inline" onclick="adjustStock('${item.id}', -1)">−</button>
          <div class="qty-value">${item.in_stock}</div>
          <button class="btn-inline" onclick="adjustStock('${item.id}', 1)">+</button>
        </div>

        <div class="stock-actions">
          <button class="btn-inline" onclick="addStockToShopping('${item.id}')">shop</button>
          <button class="btn-inline danger" onclick="deleteStockItem('${item.id}')">delete</button>
        </div>
      </div>
    </div>
  `;
}

function renderShopping() {
  if (!sessionReady || !currentUser) return;

  if (isLoading) {
    document.getElementById("panel-shopping").innerHTML = `<div class="loading">loading…</div>`;
    return;
  }

  let active = filterByRoom(appData.shopping, "shopping").filter(i => !i.checked);
  let done = filterByRoom(appData.shopping, "shopping").filter(i => i.checked);

  active.sort((a, b) =>
    roomName(a.room_id).localeCompare(roomName(b.room_id)) ||
    a.name.localeCompare(b.name)

  done.sort((a, b) =>

function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function diffDays(fromISO, toISO) {
  const a = new Date(fromISO + "T00:00:00");
  const b = new Date(toISO + "T00:00:00");
  return Math.round((b - a) / 86400000);
}

function addDays(iso, n) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function frequencyDays(freq, interval = 1) {
  const i = Math.max(1, Number(interval) || 1);
  if (freq === "daily") return 1 * i;
  if (freq === "weekly") return 7 * i;
  if (freq === "monthly") return 30 * i;
  if (freq === "quarterly") return 90 * i;
  if (freq === "custom") return i;
  return 7;
}

function frequencyLabel(freq, interval = 1) {
  if (freq === "custom") {
    if (interval === 180) return "every 6 months";
    if (interval === 365) return "yearly";
    return `every ${interval} days`;
  }
  if (freq === "daily" && interval > 1) return `every ${interval} days`;
  if (freq === "weekly" && interval > 1) return `every ${interval} weeks`;
  if (freq === "monthly" && interval > 1) return `every ${interval} months`;
  if (freq === "quarterly" && interval > 1) return `every ${interval * 3} months`;
  if (freq === "quarterly") return "quarterly";
  return freq;
}

function computeRoutineStatus(r) {
  const base = r.last_completed || todayISO();
  const dueDate = addDays(base, frequencyDays(r.frequency, r.interval));
  const daysUntilDue = diffDays(todayISO(), dueDate);
  let status = "upcoming";
  if (daysUntilDue < 0) status = "overdue";
  else if (daysUntilDue === 0) status = "due";
  else if (daysUntilDue <= 3) status = "soon";
  return { dueDate, daysUntilDue, status };
}

async function addRoutine() {
  const title = document.getElementById("routineTitle").value.trim();
  const room_id = document.getElementById("routineRoom").value;
  const frequency = document.getElementById("routineFrequency").value;
  const interval = Math.max(1, parseInt(document.getElementById("routineInterval").value, 10) || 1);
  const last_completed = document.getElementById("routineLastCompleted").value || todayISO();
  const notes = document.getElementById("routineNotes").value.trim();

  if (!title || !room_id) {
    showToast("enter title and room", "error");
    return;
  }

  const { data, error } = await db
    .from("routines")
    .insert([{
      title,
      room_id,
      frequency,
      interval,
      last_completed,
      notes,
      user_id: currentUser.id
    }])
    .select()
    .single();

  if (error) {
    console.error(error);
    showToast("failed to save routine", "error");
    return;
  }

  appData.routines.push(data);
  renderAll();
  showToast(`saved: ${title}`, "success");

  document.getElementById("routineTitle").value = "";
  document.getElementById("routineRoom").value = rooms[0]?.id || "";
  document.getElementById("routineFrequency").value = "weekly";
  document.getElementById("routineInterval").value = "1";
  document.getElementById("routineLastCompleted").value = todayISO();
  document.getElementById("routineNotes").value = "";
}

}

async function addRoom() {
  const input = document.getElementById("roomName");
  const name = input?.value.trim();

  if (!name) {
    showToast("enter a room name", "error");
    return;
  }

  const exists = rooms.some(r => r.name.trim().toLowerCase() === name.toLowerCase());
  if (exists) {
    showToast("room already exists", "error");
    return;
  }

  try {
    const { data, error } = await db
      .from("rooms")
      .insert([{
        name,
        sort_order: nextRoomSortOrder(),
        user_id: currentUser.id
      }])
      .select()
      .single();

    if (error) throw error;

    rooms.push(data);
    rooms.sort((a, b) =>
      (Number(a.sort_order) || 0) - (Number(b.sort_order) || 0) ||
      a.name.localeCompare(b.name)
    );

    input.value = "";
    renderAll();
    showToast(`added room: ${name}`, "success");
  } catch (err) {
    console.error("addRoom error:", err);
    showToast("failed to add room", "error");
  }
}

async function deleteRoom(roomId) {
  const room = rooms.find(r => r.id === roomId);
  if (!room) return;

  const usage = roomUsageCounts(roomId);
  const totalUsage = usage.routines + usage.stock + usage.shopping;

  if (totalUsage > 0) {
    showToast("room is still in use", "error");
    return;
  }

  if (!confirm(`Delete room "${room.name}"?`)) return;

  try {
    const { error } = await db
      .from("rooms")
      .delete()
      .eq("id", roomId);

    if (error) throw error;

    rooms = rooms.filter(r => r.id !== roomId);

    for (const key of Object.keys(filters)) {
      if (filters[key] === roomId) filters[key] = "All";
    }

    renderAll();
    showToast(`deleted room: ${room.name}`, "success");
  } catch (err) {
    console.error("deleteRoom error:", err);
    showToast("failed to delete room", "error");
  }
}

function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function escapeJs(s) {
  return String(s).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
}
